name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --all-packages
      - name: Lint
        run: uv run ruff check .
      - name: Security scan
        run: uv run bandit -r services/ packages/ -ll --skip B101

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --all-packages
      - name: Run unit tests
        run: uv run pytest tests/unit -v --tb=short -x --cov=services --cov=packages --cov-report=term-missing --cov-report=xml:coverage.xml
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: warn

  smoke-mock:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --all-packages
      - name: Run smoke tests (mock only)
        run: uv run pytest tests/smoke -v --tb=short -m smoke -k "not pizzuno"

  integration:
    runs-on: ubuntu-latest
    needs: smoke-mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --all-packages
      - name: Run integration tests
        run: uv run pytest tests/integration -v --tb=short || true
