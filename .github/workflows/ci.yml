name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check .
      - name: Install bandit
        run: pip install bandit
      - name: Security scan
        run: bandit -r services/ packages/ -ll --skip B101

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --all-packages
      - name: Run unit tests
        run: uv run pytest tests/unit -v --tb=short -x --cov=services --cov=packages --cov-report=term-missing --cov-report=xml:coverage.xml
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            tests/unit/__pycache__/
            .pytest_cache/

  smoke-mock:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --all-packages
      - name: Run smoke tests (mock only)
        run: uv run pytest tests/smoke -v --tb=short -m smoke -k "not pizzuno"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-mock-results
          path: .pytest_cache/

  integration:
    runs-on: ubuntu-latest
    needs: smoke-mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --all-packages
      - name: Run integration tests
        run: uv run pytest tests/integration -v --tb=short
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: .pytest_cache/
