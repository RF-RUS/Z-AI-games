[project]
name = "uno-shared-utils"
version = "0.1.0"
description = "Shared utilities for UNO Operator services"
requires-python = ">=3.11"
dependencies = [
    "uno-schemas",
    "structlog>=24.1",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/uno_shared"]

[tool.uv.sources]
uno-schemas = { workspace = true }
