[project]
name = "uno-client-sdk"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = ["uno-schemas", "httpx>=0.27"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/uno_client"]

[tool.uv.sources]
uno-schemas = { workspace = true }
